<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Projects Page</title>
    <link rel="stylesheet" href="/subProjectsPage.css">
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/footer.css">

</head>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<button>
    <a th:href="@{/project}">
        Go back
    </a>
</button>

<body>


<h1 th:text="${project.name + ' Overview'}"></h1>

<form th:action="@{/project/{id}/delete(id=${project.id})}" method="post">
    <button type="submit">Delete project</button>
</form>
<div class="main-container">

    <div class="column">
        <h3>Add</h3>
        <div class="add-box">
            <a th:href="@{/subproject/{projectId}/create(projectId=${project.id})}">
                <span>＋</span>
                <p>Create new</p>
            </a>
        </div>
        <div class="task"></div>
    </div>


    <div class="column">
        <h3>On going</h3>
        <div class="task" th:each="subProject : ${subProjects}">
            <div th:text="${subProject.name}"></div>
            <div th:text="${subProject.description}"></div>
            <a th:href="@{/subproject/{subProjectId}(subProjectId=${subProject.id})}">
                Go to sub-project
            </a>
            <form th:action="@{/subproject/{projectId}/{subProjectId}/delete(projectId=${project.id}, subProjectId=${subProject.id})}"
                  method="post"
                  onsubmit="return confirm('Are you sure you want to delete this sub-project?')">
                <button type="submit">Delete</button>
            </form>
        </div>
    </div>


    <div class="column">
        <h3>Finished</h3>
        <div class="task"></div>
        <div class="task"></div>
    </div>

    <div class="column">
        <h3 th:text="'Assigned:' + ${project.name}">Assigned:</h3>
        <div class="task" th:text="${project.projectLeader.name}"></div>
        <div class="task" th:each="employee : ${assignedEmployees}" th:text="${employee.name}"></div>
    </div>
</div>

<footer>
    <div>Est. Price: <span th:text="${totalPrice} + 'kr.'">0 kr</span></div>
    <div>Est. Time:<span th:text="${totalHours} + 'h.'">0 h.</span></div>
</footer>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
