<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid #ccc;
    }

    .home, .logout {
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    .SpalteAdd {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .sidebar {
      width: 160px;
    }

    .add-tasks {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #ccc;
      text-decoration: none;
      color: black;
    }

    .tasks-board {
      display: flex;
      flex: 1;
      border: 1px solid #ccc;
    }

    .column {
      flex: 1;
      padding: 16px;
      border-right: 1px solid #ccc;
    }

    .column:last-child {
      border-right: none;
    }

    .column h2 {
      font-size: 14px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ccc;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .done-btn, .undo-btn {
      padding: 2px 8px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header class="topbar">
  <a href="#" class="home">Home</a>
  <a href="#" class="logout">Log Out</a>
</header>

<main class="SpalteAdd">
  <div class="sidebar">
    <a href="#" class="add-tasks">Add Tasks +</a>
  </div>

  <div class="tasks-board">

    <div class="column">
      <h2>Tasks added</h2>
      <div class="task-item">
        <button class="done-btn">Done</button>
        <span>Design mockup</span>
        <span>4h</span>
      </div>
      <div class="task-item">
        <button class="done-btn">Done</button>
        <span>Write tests</span>
        <span>2h</span>
      </div>
      <div class="task-item">
        <button class="done-btn">Done</button>
        <span>Fix login bug</span>
        <span>8h</span>
      </div>
    </div>

    <div class="column">
      <h2>Done Tasks</h2>
      <div class="task-item">
        <button class="undo-btn">✕</button>
        <span>Setup project</span>
        <span>1h</span>
      </div>
      <div class="task-item">
        <button class="undo-btn">✕</button>
        <span>Database schema</span>
        <span>4h</span>
      </div>
    </div>

  </div>
</main>

</body>
</html>
