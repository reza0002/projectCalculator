<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="'Fejl ' + ${status}"></title>
  <link rel="stylesheet" href="/error.css">
</head>


<body>

<div class="container mt-5 text-center">
  <h1 class="display-1 fw-bold text-danger" th:text="${status}"></h1>
  <h2 class="mb-3">Noget gik galt!</h2>
  <p class="text-muted fs-5" th:text="${message}"></p>
  <a href="javascript:history.back()" class="btn btn-dark mt-3">← Gå tilbage</a>
</div>

</body>
</html>
