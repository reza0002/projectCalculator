<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="tasksPage.css" />
</head>
<body>

<header class="topbar">
    <a href="/homePage" class="home">Home</a>
    <a href="/logout" class="logout">Log Out</a>
</header>

<main class="SpalteAdd">
    <div class="sidebar">
        <a href="/addTasks" class="add-tasks"> Add Tasks + </a>
    </div>

    <div class="tasks-board">

        <div class="column">
            <h2>Tasks added</h2>
            <div th:each="task : ${tasks}" class="task-item">
                <button class="done-btn">Done</button>
                <span th:text="${task.name}">Task name</span>
                <span th:text="${task.time}">0</span>
            </div>
        </div>

        <div class="column">
            <h2>Done Tasks</h2>
            <div th:each="task : ${doneTasks}" class="task-item">
                <button class="delete-btn">X</button>
                <span th:text="${task.name}">Task name</span>
                <span th:text="${task.time}">0</span>
            </div>
        </div>
    </div>


</main>

</body>
</html>
