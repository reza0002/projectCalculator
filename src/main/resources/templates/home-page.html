<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<meta charset="UTF-8">
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
    <link rel="stylesheet" href="/homepage.css">
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/footer.css">
    <link rel="stylesheet" href="/homepage.css?v=7">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="section">

    <div class="section-title">
        Create new project
    </div>

    <a class="create-box" href="/project/create">
        <div class="plus">+</div>
    </a>

</div>

<div class="section">

    <div class="section-title">
        In progress project
    </div>

    <div class="projects">

        <a th:each="project : ${projects}"
           th:href="@{/project/{project_id}(project_id=${project.id})}">
            <div class="project">
                <div th:text="'ID: ' + ${project.id}"></div>
                <strong th:text="${project.name}"></strong>
                <div th:text="${project.description}"></div>
                <div th:text="'- ' + ${project.projectLeader.name}"></div>
            </div>

            <form th:action="@{/project/{id}/delete(id=${project.id})}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this project?')">
                <button type="submit">Delete</button>
            </form>

        </a>
     </div>
   </div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
