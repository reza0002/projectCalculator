<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!DOCTYPE html>
    <html lang="da">
    <head>
        <style>

            body{
                font-family: Arial;
                background-color: #f0f0f0;
                margin: 0;
                padding: 30px;
            }


            .top{
                display: flex;
                justify-content: space-between;
                margin-bottom: 40px;
            }

            .top h1{
                margin: 0;
            }



            .section{
                margin-bottom: 50px;
            }

            .section-title{
                border: 2px solid black;
                display: inline-block;
                padding: 10px 20px;
                margin-bottom: 20px;
                background-color: white;
            }


            .create-box{
                width: 250px;
                height: 150px;
                border: 3px solid black;
                background-color: white;

                display: flex;
                justify-content: center;
                align-items: center;
            }

            .plus{
                font-size: 60px;
            }


            .projects{
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
            }

            .project{
                width: 220px;
                height: 140px;
                border: 2px solid black;
                background-color: white;
                padding: 15px;
            }

            .line{
                height: 10px;
                background-color: gray;
                margin-bottom: 12px;
            }

            .small{
                width: 50%;
            }

            .medium{
                width: 75%;
            }

            .large{
                width: 100%;
            }

        </style>
    </head>

    <body>



    <div class="top">
        <h1>Home</h1>
        <h2>Log out</h2>
    </div>


    <div class="section">

        <div class="section-title">
            Create new project
        </div>

        <div class="create-box">
            <div class="plus">+</div>
        </div>

    </div>

    <div class="section">

        <div class="section-title">
            In progress project
        </div>

        <div class="projects">

            <div class="project">
                <div class="line large"></div>
                <div class="line medium"></div>
                <div class="line small"></div>
            </div>

            <div class="project">
                <div class="line medium"></div>
                <div class="line large"></div>
                <div class="line medium"></div>
            </div>

            <div class="project">
                <div class="line small"></div>
                <div class="line medium"></div>
                <div class="line large"></div>
            </div>

        </div>

    </div>

    </body>
    </html>
    <title>Title</title>
</head>
<body>

</body>
</html>
